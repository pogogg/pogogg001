<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Installer</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        h1 {
            font-size: 3rem;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        p {
            font-size: 1.5rem;
            margin: 20px 0;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.3);
        }
        .button {
            display: inline-block;
            padding: 15px 40px;
            font-size: 1.5rem;
            color: #fff;
            background: linear-gradient(90deg, #ff7e5f, #feb47b);
            text-decoration: none;
            border-radius: 50px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }
        .button:before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 300%;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            transform: skewX(-45deg);
            transition: 0.7s ease;
        }
        .button:hover {
            background: linear-gradient(90deg, #ff6a00, #ee0979);
            transform: scale(1.05);
        }
        .button:hover:before {
            left: 100%;
        }
        footer {
            margin-top: 40px;
            font-size: 1rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <h1>Install Spoofer</h1>
    <p>Click the button below to install the app directly to your device.</p>
    <a href="https://appbox.me/xweizx1i" class="button">
        Download and Install Spoofer 343.0
    </a>
    <footer>
        <p>&copy; 2024 POGOGG - Enhance Your Pokémon GO Experience!</p>
    </footer>
</body>
</html>
